<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Welcome</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body id="appBody" class="default-bg text-dark antialiased select-none">

    <div id="app">
        
        <section id="listView" class="view-panel p-6">
            <div class="header-toolbar mb-4">
                <div class="search-input-wrapper">
                    <span class="icon icon-search"></span>
                    <input type="text" id="searchBar" placeholder="Search entries...">
                </div>
                <div class="header-right-actions">
                    <span class="icon icon-stream"></span>
                    <span class="icon icon-menu"></span>
                </div>
            </div>

            <div class="brand-group mb-6">
                <h1 class="main-title">Welcome</h1>
                <div id="noteCount" class="sub-counter">0 notes</div>
            </div>

            <div id="notesContainer" class="notes-grid"></div>

            <div id="emptyState" class="empty-state-frame">
                <div class="illustration-circle">
                    <span class="icon icon-add-note"></span>
                </div>
                <h2 class="empty-title">No notes yet</h2>
                <p class="empty-text">Tap + to create your first note</p>
            </div>
        </section>

        <section id="editorView" class="view-panel fixed-view hidden mask-down">
            <div class="editor-header mb-4">
                <button id="backBtn" class="pill-btn secondary-btn">
                    <span class="icon icon-back"></span> Back
                </button>
                <div class="header-utility-cluster">
                    <button id="speakBtn" class="circle-icon-btn"><span class="icon icon-speak"></span></button>
                    <button id="exportBtn" class="circle-icon-btn"><span class="icon icon-export"></span></button>
                    <button id="colorPaletteToggle" class="circle-icon-btn accent-btn"><span class="icon icon-palette"></span></button>
                    <button id="deleteNoteBtn" class="circle-icon-btn danger-btn hidden"><span class="icon icon-delete"></span></button>
                    <button id="saveBtn" class="pill-btn primary-btn disabled-state">Done</button>
                </div>
            </div>

            <div class="metrics-hud mb-4">
                <span id="editorTimestamp"></span>
                <span id="liveMetrics" class="metric-pill">0w 0c</span>
            </div>

            <div class="editor-body-wrapper">
                <input type="text" id="noteTitle" placeholder="Title">
                <div id="noteBody" contenteditable="true" data-placeholder="Start typing your note..."></div>
            </div>

            <div class="formatting-ribbon">
                <button onclick="formatDoc('bold')" class="format-btn font-bold">B</button>
                <button onclick="formatDoc('italic')" class="format-btn font-italic">I</button>
                <button onclick="formatDoc('underline')" class="format-btn font-underline">U</button>
                <button onclick="formatDoc('strikeThrough')" class="format-btn font-strike">S</button>
                <button id="insertTodoBtn" class="format-btn special-btn"><span class="icon icon-todo"></span></button>
                <div class="separator-line"></div>
                <button id="triggerInlineSketch" class="format-btn special-btn"><span class="icon icon-draw"></span></button>
            </div>
        </section>

        <section id="sketchView" class="view-panel fixed-view hidden mask-down sketch-layer-bg">
            <div class="sketch-header p-4">
                <button id="closeSketchBtn" class="pill-btn secondary-btn">Cancel</button>
                <div class="toggle-pill-container" id="brushModeContainer">
                    <button id="penModeBtn" class="toggle-pill-item active-pill">Solid Pen</button>
                    <button id="markerModeBtn" class="toggle-pill-item">Highlighter</button>
                </div>
                <button id="saveSketchBtn" class="pill-btn primary-btn font-bold shadow-md">Save</button>
            </div>

            <div class="canvas-canvas-sheet m-4">
                <canvas id="paintCanvas"></canvas>
                <button id="clearCanvasBtn" class="circle-icon-btn text-danger shadow-inner"><span class="icon icon-clear"></span></button>
            </div>

            <div class="canvas-controls-panel p-6 shadow-2xl">
                <div class="slider-control-row mb-4">
                    <span class="icon icon-weight"></span>
                    <input type="range" id="brushThickness" min="2" max="35" value="6" class="custom-range-slider">
                </div>
                <div class="sketch-palette-row">
                    <span class="sketch-color bg-black active-color" data-color="#000000"></span>
                    <span class="sketch-color bg-gray" data-color="#6B7280"></span>
                    <span class="sketch-color bg-red" data-color="#EF4444"></span>
                    <span class="sketch-color bg-orange" data-color="#F97316"></span>
                    <span class="sketch-color bg-yellow" data-color="#EAB308"></span>
                    <span class="sketch-color bg-green" data-color="#22C55E"></span>
                    <span class="sketch-color bg-blue" data-color="#3B82F6"></span>
                </div>
            </div>
        </section>

        <div id="colorSheetOverlay" class="bottom-sheet-modal hidden fade-out">
            <div id="colorSheetCard" class="bottom-sheet-card p-6 translate-down">
                <div class="drawer-handle mb-4"></div>
                <h3 class="sheet-title mb-6">Choose Color</h3>
                <div class="sheet-color-grid">
                    <button class="sheet-color-btn c-bg-default border-active" data-bg="#FFF8F6"><span class="icon icon-check"></span></button>
                    <button class="sheet-color-btn c-bg-pink" data-bg="#FCECEB"></button>
                    <button class="sheet-color-btn c-bg-orange" data-bg="#FBF0E3"></button>
                    <button class="sheet-color-btn c-bg-yellow" data-bg="#FBF5E3"></button>
                    <button class="sheet-color-btn c-bg-green" data-bg="#EBFCEE"></button>
                    <button class="sheet-color-btn c-bg-cyan" data-bg="#EBF9FC"></button>
                    <button class="sheet-color-btn c-bg-purple" data-bg="#EEEDFC"></button>
                    <button class="sheet-color-btn c-bg-rose" data-bg="#FCEEFC"></button>
                </div>
            </div>
        </div>

        <div id="masterFabWrapper" class="action-fab-system-wrapper">
            <div id="fabMenuOptions" class="fab-options-stack hidden opacity-0 shift-down">
                <div id="actionSketch" class="fab-option-row">
                    <span class="fab-option-label">Drawing</span>
                    <button class="circle-icon-btn bg-pink shadow-md text-accent"><span class="icon icon-brush"></span></button>
                </div>
                <div id="actionNewNote" class="fab-option-row">
                    <span class="fab-option-label">New Note</span>
                    <button class="circle-icon-btn bg-gold shadow-md text-gold-dark"><span class="icon icon-edit"></span></button>
                </div>
            </div>
            <button id="masterFab" class="master-fab-trigger shadow-xl"><span id="fabIcon" class="icon icon-add"></span></button>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
